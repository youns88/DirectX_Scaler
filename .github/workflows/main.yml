name: Build Scaler
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Compile
        run: |
          cl.exe /O2 /MT /EHsc main.cpp /link d3d11.lib dxgi.lib d3dcompiler.lib user32.lib gdi32.lib /OUT:SharpScaler.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScalerExe
          path: SharpScaler.exe
